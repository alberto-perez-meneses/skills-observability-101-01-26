
services:
  service-one:
    container_name: service-one
    build:
      context: ./service-one
      dockerfile: Dockerfile
    environment:
      OTEL_SERVICE_NAME: service-one
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: service.name=service-one,service.namespace=demo
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
      OTEL_INSTRUMENTATION_LOG4J_APPENDER_ENABLED: "true"
    ports:
      - "8081:8080"
    depends_on:
      - otel-collector

  service-two:
    container_name: service-two
    build:
      context: ./service-two
      dockerfile: Dockerfile
    environment:
      OTEL_SERVICE_NAME: service-two
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: service.name=service-two,service.namespace=demo
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
      OTEL_INSTRUMENTATION_LOG4J_APPENDER_ENABLED: "true"
    ports:
      - "8082:8080"
    depends_on:
      - otel-collector

  jaeger:
    image: jaegertracing/jaeger:2.14.1
    ports:
      - "16686:16686"  

  otel-collector:
    image: otel/opentelemetry-collector:latest
    environment:
      - OPENOBSERVE_BEARER_TOKEN=${OPENOBSERVE_BEARER_TOKEN}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger
    
  prometheus:
    build:
      context: ./prometheus
    ports:
      - 9090:9090
    environment:
      OPENOBSERVE_REMOTE_USER: ${OPENOBSERVE_REMOTE_USER}
      OPENOBSERVE_REMOTE_KEY: ${OPENOBSERVE_REMOTE_KEY}
    
    volumes:
      - ./.prometheus_data:/prometheus

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    ports:
      - 8080:8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  openobserve:
    image: o2cr.ai/openobserve/openobserve-enterprise:v0.50.3
    container_name: openobserve
    ports:
      - "5080:5080"
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
    volumes:
      - ./.openobserve/data:/data
    restart: unless-stopped