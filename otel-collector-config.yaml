receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint:  0.0.0.0:4318

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlp:
    endpoint: otel-collector:4317
    tls:
      insecure: true
    sending_queue:
      batch:
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true
    #tls:
    #  insecure: true
  otlp/openobserve:
    endpoint: openobserve:5081
    headers:
      Authorization: "${OPENOBSERVE_BEARER_TOKEN}"
      organization: default
      stream-name: "%{service.name}"
    tls:
      insecure: true

processors:
  batch:
  resource:
    attributes:
      - key: deployment.environment
        value: docker-demo
        action: upsert

      - key: telemetry.stack
        value: observability-workshop
        action: upsert

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource,batch]
      exporters: [otlp/jaeger,otlp/openobserve]
    metrics:
      receivers: [otlp]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [resource,batch]
      exporters: [otlp/openobserve]