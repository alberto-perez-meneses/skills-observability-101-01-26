receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint:  0.0.0.0:4318

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlp:
    endpoint: otel-collector:4317
    tls:
      insecure: true
    sending_queue:
      batch:
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true
    #tls:
    #  insecure: true

processors:
  batch:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      exporters: [prometheus]